<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./Style.css">
</head>
<body>

    <!-- Navbar -->
    <div id="navbar"></div>

    <!-- Contact Section -->
    <section class="contact-section">
        <div class="container">
            <div class="contact-card">

                <h2>Contact Us</h2>
                <p class="contact-name">Deepanshu</p>
                <p class="contact-email">emai.com</p>

                <div class="social-links">

                    <a href="https://facebook.com" target="_blank" class="social-btn facebook">
                        <i class="bi bi-facebook"></i> Facebook
                    </a>

                    <a href="https://instagram.com" target="_blank" class="social-btn instagram">
                        <i class="bi bi-instagram"></i> Instagram
                    </a>

                    <a href="https://linkedin.com" target="_blank" class="social-btn linkedin">
                        <i class="bi bi-linkedin"></i> LinkedIn
                    </a>

                </div>

            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 Service Company. All Rights Reserved.</p>
    </footer>

    <!-- Load Navbar -->
    <script>
        fetch("navbar.html")
            .then(response => response.text())
            .then(data => {
                document.getElementById("navbar").innerHTML = data;
            });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
